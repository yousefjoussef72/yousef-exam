<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مملكة يوسف علاء | التسجيل</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #050505; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .setup-box { background: rgba(15, 15, 15, 0.95); padding: 35px; border-radius: 20px; border: 2px solid #ff003c; text-align: center; width: 90%; max-width: 400px; box-shadow: 0 0 30px rgba(255, 0, 60, 0.3); }
        h1 { color: #fff; font-size: 22px; margin-bottom: 25px; }
        input { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 10px; border: 1px solid #333; background: #111; color: white; box-sizing: border-box; outline: none; }
        input:focus { border-color: #ffb700; }
        .btn-next { background: #ff003c; color: white; border: none; padding: 15px; border-radius: 10px; font-weight: 900; cursor: pointer; width: 100%; font-size: 18px; }
    </style>
</head>
<body>
    <div class="setup-box">
        <h1>⛩️ بيانات دخول المملكة</h1>
        <form onsubmit="goGate(event)">
            <input type="text" id="n" placeholder="اسمك الحقيقي" required>
            <input type="email" id="e" placeholder="بريدك الإلكتروني" required>
            <button type="submit" class="btn-next">التالي: اختبار القوة ⚔️</button>
        </form>
    </div>
    <script>
        function goGate(e) {
            e.preventDefault();
            localStorage.setItem('u_name', document.getElementById('n').value);
            localStorage.setItem('u_mail', document.getElementById('e').value);
            window.location.href = 'gate.html';
        }
    </script>
</body>
</html>
