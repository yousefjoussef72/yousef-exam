<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار الأوتاكو للدخول</title>
    <style>
        /* تنسيق الخلفية لتكون صور أبطال الأنمي */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* استبدل الرابط أدناه برابط صورة تجمع أبطال الأنمي */
            background-image: url('https://example.com/anime-background.jpg'); 
            background-size: cover;
            background-attachment: fixed;
            color: #fff;
            margin: 0;
            padding: 20px;
        }
        /* تنسيق صندوق النموذج */
        .container {
            background-color: rgba(0, 0, 0, 0.8);
            max-width: 600px;
            margin: auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(255, 69, 0, 0.5);
        }
        input, select, button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: none;
            box-sizing: border-box;
        }
        button {
            background-color: #ff4500;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background-color: #cc3700; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align: center; color: #ff4500;">بوابة دخول الأوتاكو</h1>
    <p style="text-align: center;">أجب على الأسئلة لتثبت جدارتك وتنضم للجروب!</p>

    <form id="otakuForm">
        <input type="text" id="userName" placeholder="الاسم" required>
        <input type="number" id="userAge" placeholder="السن" required>
        <input type="email" id="userEmail" placeholder="البريد الإلكتروني" required>
        
        <select id="userTitle" required>
            <option value="" disabled selected>اختر لقبك (شخصيتك المفضلة)</option>
            <option value="ملك القراصنة - لوفي">ملك القراصنة - لوفي</option>
            <option value="الهوكاجي - ناروتو">الهوكاجي - ناروتو</option>
            <option value="أقوى ساحر - غوجو">أقوى ساحر - غوجو</option>
        </select>

        <h3>أي أنمي تشجع؟</h3>
        <select id="animeChoice" onchange="showQuestions()" required>
            <option value="" disabled selected>اختر الأنمي</option>
            <option value="onepiece">One Piece</option>
            <option value="aot">Attack on Titan</option>
        </select>

        <div id="questionsDiv" class="hidden">
            <h4 id="questionText"></h4>
            <select id="animeAnswer" required>
                </select>
        </div>

        <button type="submit" id="submitBtn">إرسال والانضمام للجروب</button>
    </form>
</div>

<script>
    // إعدادات التليجرام والواتساب (يجب تعديلها)
    const botToken = '8737868558:AAFqvBT8qY3E5kJDC8bjXT1Ku9gSBXv9Q4g';
    const chatId = '7394389253';
    const whatsappLink = 'https://chat.whatsapp.com/';

    // بيانات الأسئلة حسب الأنمي
    const animeData = {
        onepiece: {
            question: "ما هو اسم الفاكهة الحقيقي التي أكلها لوفي؟",
            options: ["جومو جومو نو مي", "هيتو هيتو نو مي (نموذج نيكا)", "ميرا ميرا نو مي"],
            correctAnswer: "هيتو هيتو نو مي (نموذج نيكا)"
        },
        aot: {
            question: "من هو صاحب العملاق المدرع؟",
            options: ["إيرين ييغر", "راينر براون", "بيرتولدت هوفر"],
            correctAnswer: "راينر براون"
        }
    };

    // إظهار الأسئلة بناءً على الاختيار
    function showQuestions() {
        const choice = document.getElementById('animeChoice').value;
        const qDiv = document.getElementById('questionsDiv');
        const qText = document.getElementById('questionText');
        const qSelect = document.getElementById('animeAnswer');

        if(animeData[choice]) {
            qDiv.classList.remove('hidden');
            qText.innerText = animeData[choice].question;
            
            // تفريغ الخيارات القديمة ووضع الجديدة
            qSelect.innerHTML = '<option value="" disabled selected>اختر إجابتك</option>';
            animeData[choice].options.forEach(opt => {
                qSelect.innerHTML += `<option value="${opt}">${opt}</option>`;
            });
        }
    }

    // التعامل مع إرسال النموذج
    document.getElementById('otakuForm').addEventListener('submit', function(e) {
        e.preventDefault(); // منع إعادة تحميل الصفحة
        
        // جمع البيانات
        const name = document.getElementById('userName').value;
        const age = document.getElementById('userAge').value;
        const email = document.getElementById('userEmail').value;
        const title = document.getElementById('userTitle').value;
        const anime = document.getElementById('animeChoice').value;
        const answer = document.getElementById('animeAnswer').value;
        
        // التحقق من الإجابة
        let scoreMsg = "الإجابة خاطئة ❌";
        if(answer === animeData[anime].correctAnswer) {
            scoreMsg = "الإجابة صحيحة ✅ (يستحق الجائزة!)";
        }

        // تجهيز الرسالة للتليجرام
        const message = `
🌟 عضو جديد يطلب الانضمام 🌟
👤 الاسم: ${name}
📅 السن: ${age}
📧 الإيميل: ${email}
👑 اللقب: ${title}
📺 الأنمي المفضل: ${anime}
📝 الإجابة: ${answer}
🏆 النتيجة: ${scoreMsg}
        `;

        // إرسال البيانات لبوت التليجرام
        const tgUrl = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}`;
        
        fetch(tgUrl)
            .then(response => {
                if(response.ok) {
                    alert("تم إرسال إجاباتك بنجاح! سيتم تحويلك لجروب الواتساب الآن.");
                    window.location.href = whatsappLink; // التحويل للواتساب
                } else {
                    alert("حدث خطأ أثناء الإرسال. تأكد من إعدادات البوت.");
                }
            })
            .catch(error => {
                alert("تعذر الاتصال بالخادم.");
            });
    });
</script>

</body>
</html>
