<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الأوتاكو - التحدي الأكبر</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        /* التنسيق العام والخلفية */
        body {
            font-family: 'Tajawal', sans-serif;
            background: url('https://w.wallhaven.cc/full/wq/wallhaven-wqvep7.jpg') no-repeat center center fixed; 
            background-size: cover;
            color: #fff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* التصميم الزجاجي الساحر للصندوق */
        .glass-container {
            background: rgba(15, 15, 20, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 500px;
            width: 100%;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(255, 69, 0, 0.3);
            animation: fadeIn 1s ease-in-out;
        }

        h1 {
            text-align: center;
            color: #ff5722;
            text-shadow: 0 0 10px #ff5722;
            margin-bottom: 5px;
        }

        p.subtitle {
            text-align: center;
            color: #ddd;
            margin-bottom: 30px;
            font-size: 14px;
        }

        /* تنسيق الحقول */
        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
            transition: 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #ff5722;
            box-shadow: 0 0 8px rgba(255, 87, 34, 0.5);
            background: rgba(255, 255, 255, 0.2);
        }

        /* لون خيارات القائمة المنسدلة */
        option { background: #222; color: #fff; }

        /* تنسيق زر الإرسال */
        button {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(45deg, #ff5722, #ff9800);
            color: white;
            font-size: 18px;
            font-weight: bold;
            font-family: 'Tajawal', sans-serif;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 87, 34, 0.4);
        }

        /* صورة الشخصية المختارة */
        #characterImage {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            margin: 10px auto;
            border: 3px solid #ff5722;
            box-shadow: 0 0 15px rgba(255, 87, 34, 0.5);
            display: none; /* مخفية في البداية */
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .hidden { display: none; }

        /* تأثيرات الحركة */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes popIn { from { transform: scale(0); } to { transform: scale(1); } }
    </style>
</head>
<body>

<div class="glass-container">
    <h1>بوابة دخول الأوتاكو</h1>
    <p class="subtitle">أجب لتثبت جدارتك وتنضم لجيش الأوتاكو!</p>

    <form id="otakuForm">
        <input type="text" id="userName" placeholder="اسمك أو لقبك الحقيقي" required>
        <input type="number" id="userAge" placeholder="السن" required>
        <input type="email" id="userEmail" placeholder="البريد الإلكتروني" required>
        
        <select id="userTitle" onchange="showCharacterImage()" required>
            <option value="" disabled selected>اختر لقبك (شخصيتك المفضلة)</option>
            <option value="لوفي" data-img="https://i.pinimg.com/736x/8a/26/5a/8a265a31742408b08709337b5d19dbb3.jpg">ملك القراصنة - لوفي</option>
            <option value="ناروتو" data-img="https://i.pinimg.com/736x/21/cd/ca/21cdca43e498d9ba80d6b5e0c8b9d88c.jpg">الهوكاجي - ناروتو</option>
            <option value="غوجو" data-img="https://i.pinimg.com/736x/f6/ba/a1/f6baa10935d21c0807e3ea8de90b7933.jpg">أقوى ساحر - غوجو</option>
            <option value="ليفاي" data-img="https://i.pinimg.com/736x/01/a0/0b/01a00be550e56cc21cb4bd6df3c01c0c.jpg">عريف الاستطلاع - ليفاي</option>
        </select>
        
        <img id="characterImage" src="" alt="شخصيتك">

        <h3 style="border-bottom: 1px solid #555; padding-bottom: 5px;">تحدي الأنمي ⚔️</h3>
        <select id="animeChoice" onchange="showQuestions()" required>
            <option value="" disabled selected>اختر أنمي لتُمتحن فيه</option>
            <option value="onepiece">ون بيس (One Piece)</option>
            <option value="aot">هجوم العمالقة (AOT)</option>
            <option value="naruto">ناروتو (Naruto)</option>
        </select>

        <div id="questionsDiv" class="hidden">
            <p id="questionText" style="color: #ff9800; font-weight: bold;"></p>
            <select id="animeAnswer" required></select>
        </div>

        <button type="submit" id="submitBtn">أرسل الإجابات وانضم للجروب 🚀</button>
    </form>
</div>

<script>
    // === إعداداتك الخاصة (قم بتعديلها) ===
    const botToken = "8737868558:AAFqvBT8qY3E5kJDC8bjXT1Ku9gSBXv9Q4g";
    const chatId = "7394389253";
    const whatsappLink = 'https://chat.whatsapp.com/ضع_رابط_جروبك_هنا';

    // === بنك الأسئلة ===
    const animeData = {
        onepiece: {
            question: "من هو أول عضو انضم لطاقم قبعة القش؟",
            options: ["سانجي", "زورو", "نامي", "أوسوب"],
            correctAnswer: "زورو"
        },
        aot: {
            question: "ما هو اسم الفيلق الذي ينتمي إليه إيرين؟",
            options: ["فيلق الشرطة العسكرية", "فيلق الحماية", "فيلق الاستطلاع"],
            correctAnswer: "فيلق الاستطلاع"
        },
        naruto: {
            question: "من هو معلم الفريق السابع؟",
            options: ["جيرايا", "كاكاشي", "إيروكا"],
            correctAnswer: "كاكاشي"
        }
    };

    // إظهار صورة الشخصية عند اختيار اللقب
    function showCharacterImage() {
        const select = document.getElementById('userTitle');
        const selectedOption = select.options[select.selectedIndex];
        const imgSrc = selectedOption.getAttribute('data-img');
        const imgElement = document.getElementById('characterImage');
        
        if (imgSrc) {
            imgElement.src = imgSrc;
            imgElement.style.display = 'block';
        }
    }

    // إظهار الأسئلة
    function showQuestions() {
        const choice = document.getElementById('animeChoice').value;
        const qDiv = document.getElementById('questionsDiv');
        const qText = document.getElementById('questionText');
        const qSelect = document.getElementById('animeAnswer');

        if(animeData[choice]) {
            qDiv.classList.remove('hidden');
            qText.innerText = animeData[choice].question;
            qSelect.innerHTML = '<option value="" disabled selected>اختر إجابتك بحكمة...</option>';
            animeData[choice].options.forEach(opt => {
                qSelect.innerHTML += `<option value="${opt}">${opt}</option>`;
            });
        }
    }

    // إرسال البيانات
    document.getElementById('otakuForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.innerText = "جاري التحقق والإرسال... ⏳";
        btn.disabled = true;
        
        const name = document.getElementById('userName').value;
        const age = document.getElementById('userAge').value;
        const email = document.getElementById('userEmail').value;
        const title = document.getElementById('userTitle').value;
        const anime = document.getElementById('animeChoice').options[document.getElementById('animeChoice').selectedIndex].text;
        const answer = document.getElementById('animeAnswer').value;
        
        const animeKey = document.getElementById('animeChoice').value;
        const isCorrect = answer === animeData[animeKey].correctAnswer;
        const scoreMsg = isCorrect ? "الإجابة صحيحة ✅ (أوتاكو حقيقي)" : "الإجابة خاطئة ❌ (يحتاج مراجعة)";

        const message = `
🔥 طلب انضمام جديد (بوابة الأوتاكو) 🔥
---------------------------
👤 الاسم: ${name}
📅 السن: ${age}
📧 الإيميل: ${email}
👑 اللقب المختار: ${title}
📺 اختبر في: ${anime}
📝 إجابته كانت: ${answer}
🏆 النتيجة: ${scoreMsg}
        `;

        const tgUrl = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}`;
        
        fetch(tgUrl)
            .then(response => {
                if(response.ok) {
                    // رسالة نجاح أنيقة باستخدام SweetAlert
                    Swal.fire({
                        title: isCorrect ? 'أحسنت يا بطل! 🎉' : 'تم التسجيل! 👍',
                        text: isCorrect ? 'إجابتك صحيحة! سيتم تحويلك للجروب الآن.' : 'إجابتك خاطئة للأسف، لكن سنقبلك في الجروب لتتعلم المزيد!',
                        icon: isCorrect ? 'success' : 'info',
                        confirmButtonText: 'انطلق للجروب!',
                        confirmButtonColor: '#ff5722'
                    }).then((result) => {
                        window.location.href = whatsappLink;
                    });
                } else {
                    Swal.fire('خطأ!', 'تأكد من إعدادات بوت التليجرام.', 'error');
                    btn.innerText = "أرسل الإجابات وانضم للجروب 🚀";
                    btn.disabled = false;
                }
            })
            .catch(error => {
                Swal.fire('خطأ بالاتصال!', 'تأكد من اتصالك بالإنترنت.', 'error');
                btn.innerText = "أرسل الإجابات وانضم للجروب 🚀";
                btn.disabled = false;
            });
    });
</script>

</body>
</html>
