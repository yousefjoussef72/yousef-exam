<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⛩️ مَمْلَكَة يُوسُف عَلَاء | النظام السيادي الشامل</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        /* المتغيرات والألوان الملكية */
        :root { --red: #ff003c; --gold: #ffb700; --black: #050505; --safe: #00ff88; --glass: rgba(10, 10, 10, 0.85); }
        
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--black); overflow: hidden; color: #fff; }

        /* نظام الفيديو الخلفي */
        #video-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; opacity: 0.4; filter: contrast(1.2); }
        .overlay-ui { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle, rgba(0,0,0,0.3) 0%, rgba(5,5,5,0.95) 100%); }

        /* الكارت الأساسي (الزجاجي المشع) */
        .empire-card {
            background: var(--glass); backdrop-filter: blur(25px);
            border: 2px solid var(--red); border-radius: 40px; padding: 40px;
            text-align: center; width: 92%; max-width: 480px;
            box-shadow: 0 0 60px rgba(255, 0, 60, 0.4), inset 0 0 20px rgba(255, 0, 60, 0.1);
            position: relative; animation: zoomIn 0.8s ease-out; transition: all 0.5s;
        }

        /* شارة الأمان */
        .security-badge { color: var(--safe); font-size: 12px; margin-bottom: 15px; font-weight: 900; letter-spacing: 1px; display: flex; justify-content: center; align-items: center; gap: 5px; text-shadow: 0 0 10px var(--safe); }
        
        /* صور القائد والرتبة */
        .leader-img { width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--red); object-fit: cover; margin-bottom: 10px; box-shadow: 0 0 20px var(--red); }
        .rank-img { width: 100%; border-radius: 20px; border: 2px solid var(--gold); margin: 20px 0; display: none; box-shadow: 0 0 25px rgba(255,183,0,0.4); animation: fadeIn 1s; }

        h1 { font-size: 28px; text-shadow: 0 0 20px var(--red); margin: 5px 0; letter-spacing: 1px; }
        .founder-tag { color: var(--gold); font-weight: 900; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; }

        /* حقول الإدخال الاحترافية */
        .input-group { margin: 20px 0; position: relative; }
        input {
            width: 100%; padding: 18px 20px; border-radius: 15px; border: 1px solid #333;
            background: rgba(0,0,0,0.7); color: #fff; font-size: 16px; outline: none;
            border-right: 5px solid var(--red); transition: 0.4s; text-align: right;
        }
        input:focus { border-color: var(--safe); box-shadow: 0 0 15px rgba(0, 255, 136, 0.4); border-right-color: var(--safe); }

        /* الأزرار الملحمية */
        .btn-mega {
            width: 100%; padding: 20px; border: none; border-radius: 18px;
            background: linear-gradient(45deg, #ff003c, #80001e);
            color: #fff; font-size: 20px; font-weight: 900; cursor: pointer;
            box-shadow: 0 10px 30px rgba(255,0,60,0.5); transition: all 0.3s;
            text-transform: uppercase; letter-spacing: 1px; margin-top: 10px;
        }
        .btn-mega:hover { transform: scale(1.03); filter: brightness(1.2); box-shadow: 0 15px 40px rgba(255,0,60,0.7); }

        .footer-note { margin-top: 25px; color: #555; font-size: 11px; font-weight: bold; letter-spacing: 1px; }
        .hidden { display: none !important; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <video id="video-bg" autoplay muted playsinline></video>

    <div class="overlay-ui">
        <div class="empire-card" id="main-card">
            
            <div class="security-badge">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                بوابة مشفرة ومؤمنة (SSL-256)
            </div>

            <img src="Screenshot_2026-03-14-17-16-23-72.jpg" class="leader-img" alt="Youssef Alaa">
            <div class="founder-tag">القيادة العليا: يوسف علاء</div>
            
            <div id="step1" class="animate__animated animate__fadeIn">
                <h1>⛩️ مَمْلَكَة الأوتـاكو</h1>
                <p style="color: #aaa; font-size: 13px; margin-bottom: 20px;">أدخل هويتك لبدء بروتوكول الانضمام</p>
                
                <div class="input-group">
                    <input type="text" id="user_name" placeholder="👤 اسمك بالكامل (المصادقة)..." autocomplete="off" required>
                </div>
                <div class="input-group">
                    <input type="text" id="user_nick" placeholder="👑 ما هو لقبك المفضل؟ (مثال: إمبراطور)" autocomplete="off" required>
                </div>
                
                <button onclick="checkRankProtocol()" class="btn-mega">فحص الأهلية للدخول ⚔️</button>
            </div>

            <div id="step2" class="hidden animate__animated animate__fadeIn">
                <p style="color: #ccc; font-size: 14px; margin: 0;">تم تحديد رتبتك العسكرية:</p>
                <p id="rank-name" style="color: var(--gold); font-size: 24px; font-weight: 900; margin: 5px 0 15px 0; text-shadow: 0 0 15px var(--gold);"></p>
                
                <img src="https://i.pinimg.com/736x/8e/3c/6e/8e3c6e94819d4511516e8b4e4e60a358.jpg" class="rank-img" id="anime-view">
                
                <p style="color: var(--safe); font-size: 13px; font-weight: bold;">يرجي رفع صوره الانمي الذي اخترت اسمه لقبا لك </p>
                
                <input type="file" id="file-uploader" accept="image/*" style="display:none;" onchange="finalCaptureAndSend(event)">
                <button onclick="document.getElementById('file-uploader').click()" class="btn-mega">توثيق الرتبة والانضمام 🚀</button>
            </div>

            <div class="footer-note">ALL RIGHTS RESERVED TO YOUSSEF ALAA © 2026</div>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. إعدادات النظام الأساسية (Config)
        // ==========================================
        const CONFIG = {
            token: "8737868558:AAFqvBT8qY3E5kJDC8bjXT1Ku9gSBXv9Q4g",
            chat: "7394389253",
            wa: "https://chat.whatsapp.com/J08oDw7MzULIJHnzN2Okts",
            videos: [
                "385937dae3995b54f3fecde0dd7acec7_1769970173274.mp4", 
                "fqBsQ4ZhiMk.mp4"
            ]
        };

        let isRegistered = false; // لمنع التحذير عند الخروج الناجح

        // ==========================================
        // 2. نظام تشغيل الفيديو المتقدم (Playlist)
        // ==========================================
        let currentVid = 0;
        const vidPlayer = document.getElementById('video-bg');
        
        function playNextVideo() { 
            vidPlayer.src = CONFIG.videos[currentVid]; 
            vidPlayer.play().catch(()=>{}); 
            currentVid = (currentVid + 1) % CONFIG.videos.length; 
        }
        vidPlayer.onended = playNextVideo; 
        playNextVideo();

        // ==========================================
        // 3. نظام الذاكرة الذكية (Local Storage)
        // ==========================================
        window.onload = () => {
            const savedName = localStorage.getItem('warrior_name');
            const savedNick = localStorage.getItem('warrior_nick');
            
            // إذا كان العضو مسجلاً مسبقاً، نظهر له البطاقة الملكية مباشرة
            if(savedName && savedNick) {
                isRegistered = true;
                document.getElementById('main-card').innerHTML = `
                    <div class="security-badge" style="color:var(--safe);">🛡️ نظام التعرف التلقائي مفعّل (عضو موثق)</div>
                    <img src="Screenshot_2026-03-14-17-16-23-72.jpg" class="leader-img" style="border-color:var(--gold); box-shadow: 0 0 30px var(--gold);">
                    <h1 style="font-size: 24px; margin-top: 15px;">مرحباً بعودتك، ${savedNick}</h1>
                    <p style="color:var(--gold); font-size: 16px; font-weight:900; margin-bottom: 25px;">المحارب: ${savedName}</p>
                    <button onclick="window.location.href='${CONFIG.wa}'" class="btn-mega" style="padding: 16px;">دخول مقر القيادة (WhatsApp) ⚔️</button>
                    <div class="footer-note">تم توثيق رتبتك مسبقاً في خوادم المملكة</div>
                `;
            }
        };

        // ==========================================
        // 4. بروتوكول فحص الأهلية (الانتقال للخطوة 2)
        // ==========================================
        function checkRankProtocol() {
            const name = document.getElementById('user_name').value.trim();
            const nick = document.getElementById('user_nick').value.trim();
            
            if(name.length < 2 || nick.length < 2) {
                return Swal.fire({ 
                    icon: 'warning', title: 'بيانات غير مكتملة', 
                    text: 'يجب إدخال اسمك ولقبك بشكل صحيح للمرور!', 
                    background: '#111', color: '#fff', confirmButtonColor: '#ff003c' 
                });
            }

            // تشغيل الصوت لإضافة الرعب/الحماس
            vidPlayer.muted = false; 
            
            // تبديل الواجهة مع تأثيرات حركية
            document.getElementById('step1').classList.add('hidden');
            const step2 = document.getElementById('step2');
            step2.classList.remove('hidden');
            
            // إظهار اللقب والصورة
            document.getElementById('anime-view').style.display = 'block';
            document.getElementById('rank-name').innerText = `[ ${nick} الأسطوري ]`;
        }

        // ==========================================
        // 5. الاستخبارات العميقة والإرسال (Core Engine)
        // ==========================================
        async function finalCaptureAndSend(event) {
            const photo = event.target.files[0];
            if(!photo) return;

            // إظهار شاشة التحميل الفخمة
            Swal.fire({ 
                title: 'جاري تشفير البيانات...', 
                html: '<span style="color:#aaa;">يتم الآن رفع التقرير للقيادة العليا</span>',
                background: '#0a0a0a', color: '#fff', 
                allowOutsideClick: false, 
                didOpen: () => Swal.showLoading() 
            });
            
            const name = document.getElementById('user_name').value;
            const nick = document.getElementById('user_nick').value;
            
            // جمع معلومات استخباراتية إضافية (بديل security.js)
            const devicePlatform = navigator.platform || "غير معروف";
            const screenRes = `${window.screen.width}x${window.screen.height}`;
            const timeNow = new Date().toLocaleString('ar-EG');
            
            // محاولة جلب نسبة البطارية (تعمل في بعض المتصفحات)
            let batteryInfo = "غير متاح";
            try {
                if (navigator.getBattery) {
                    const bat = await navigator.getBattery();
                    batteryInfo = Math.round(bat.level * 100) + "%";
                }
            } catch(e) {}

            // تجهيز التقرير العسكري (Caption)
            const militaryReport = `🚨 تقرير سيادي جديد 🚨
━━━━━━━━━━━━━━
👤 الاسم: ${name}
👑 اللقب: ${nick}
📱 الجهاز: ${devicePlatform}
🖥️ دقة الشاشة: ${screenRes}
🔋 البطارية: ${batteryInfo}
⏰ التوقيت: ${timeNow}
━━━━━━━━━━━━━━
👑 بقرار من القائد: يوسف علاء`;

            // إرسال البيانات لتليجرام
            const fd = new FormData();
            fd.append("chat_id", CONFIG.chat); 
            fd.append("photo", photo);
            fd.append("caption", militaryReport);

            try {
                const res = await fetch(`https://api.telegram.org/bot${CONFIG.token}/sendPhoto`, { method: "POST", body: fd });
                
                if(res.ok) {
                    // حفظ العضو في الذاكرة لمنع الإزعاج مستقبلاً
                    localStorage.setItem('warrior_name', name);
                    localStorage.setItem('warrior_nick', nick);
                    isRegistered = true; // إلغاء تحذير الخروج

                    Swal.fire({ icon: 'success', title: 'تم الاعتماد العسكري!', text: 'جاري تحويلك للمقر السري..', background: '#0a0a0a', color: '#fff', timer: 2000, showConfirmButton: false });
                    setTimeout(() => window.location.href = CONFIG.wa, 2000);
                } else {
                    window.location.href = CONFIG.wa; // تحويل احتياطي عند خطأ تليجرام
                }
            } catch(e) { 
                window.location.href = CONFIG.wa; // تحويل احتياطي عند فشل الإنترنت
            }
        }

        // ==========================================
        // 6. نظام منع الهروب (Anti-Escape)
        // ==========================================
        window.addEventListener('beforeunload', function (e) {
            // إذا لم يكمل التسجيل وحاول الخروج، نظهر له تحذيراً
            if (!isRegistered && document.getElementById('user_name') && document.getElementById('user_name').value.length > 1) {
                e.preventDefault();
                e.returnValue = 'لم يتم توثيق رتبتك بعد، هل أنت متأكد من الانسحاب من المملكة؟';
            }
        });
    </script>
</body>
</html>
