<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أسئلة واختبار يوسف</title>
    <style>
        body {
            /* وضع صورتك كخلفية للموقع */
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('Screenshot_2026-03-14-17-16-23-72.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
        }
        .container {
            background: rgba(22, 27, 34, 0.9); /* خلفية شفافة عشان الصورة تبان */
            padding: 25px;
            border-radius: 20px;
            border: 2px solid #58a6ff;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            margin: 20px;
        }
        h2 { color: #58a6ff; text-align: center; margin-bottom: 20px; font-size: 22px; }
        .field { margin-bottom: 12px; text-align: right; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input, select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #30363d;
            background: rgba(13, 17, 23, 0.8);
            color: white;
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
        }
        button {
            background: #238636;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }
        button:hover { background: #2ea043; transform: scale(1.02); }
        #status { text-align: center; margin-top: 10px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>أجب على الأسئلة يا بطل ⚽</h2>
        
        <div class="field">
            <label>👤 الاسم بالكامل:</label>
            <input type="text" id="name" placeholder="ما اسمك؟">
        </div>

        <div class="field">
            <label>📧 البريد الإلكتروني:</label>
            <input type="email" id="email" placeholder="بريدك الإلكتروني">
        </div>

        <div class="field">
            <label>🎓 السنة الدراسية:</label>
            <input type="text" id="grade" placeholder="مثلاً: أولى ثانوي">
        </div>

        <div class="field">
            <label>🎂 كم عمرك؟</label>
            <input type="number" id="age" placeholder="سنك كام؟">
        </div>

        <div class="field">
            <label>❤️ ماذا تحب؟</label>
            <input type="text" id="love" placeholder="هوايتك المفضلة">
        </div>

        <div class="field">
            <label>⚽ رأيك في تشكيلتي؟</label>
            <select id="opinion">
                <option value="عالمية 🔥">عالمية 🔥</option>
                <option value="كويسة جداً 👍">كويسة جداً 👍</option>
                <option value="محتاجة تعديل 🛠️">محتاجة تعديل 🛠️</option>
            </select>
        </div>

        <div class="field">
            <label>🛡️ ناديك المفضل؟</label>
            <input type="text" id="club" placeholder="بتشجع مين؟">
        </div>

        <button onclick="sendData()">إرسال البيانات ليوسف 🚀</button>
        
        <p id="status"></p>
    </div>

    <script>
        function sendData() {
            const token = "8737868558:AAFqvBT8qY3E5kJDC8bjXT1Ku9gSBXv9Q4g"; 
            const chat_id = "7394389253";
            
            const data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                grade: document.getElementById('grade').value,
                age: document.getElementById('age').value,
                love: document.getElementById('love').value,
                opinion: document.getElementById('opinion').value,
                club: document.getElementById('club').value
            };

            if(!data.name || !data.email) {
                alert("من فضلك اكتب الاسم والإيميل على الأقل!");
                return;
            }

            const status = document.getElementById('status');
            status.innerText = "جاري الإرسال...";

            const text = `🔥 وصلت إجابة جديدة! 🔥\n\n👤 الاسم: ${data.name}\n📧 الإيميل: ${data.email}\n🎓 السنة: ${data.grade}\n🎂 العمر: ${data.age}\n❤️ يحب: ${data.love}\n⚽ التشكيلة: ${data.opinion}\n🛡️ النادي: ${data.club}`;

            const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(text)}`;

            fetch(url).then(res => {
                if(res.ok) {
                    status.style.color = "#3fb950";
                    status.innerText = "تم الإرسال بنجاح! ✅";
                    alert("إجاباتك وصلت ليوسف، شكراً لك!");
                    // مسح الخانات
                    document.getElementById('name').value = "";
                    document.getElementById('email').value = "";
                } else {
                    status.style.color = "#f85149";
                    status.innerText = "خطأ في الإرسال.";
                }
            });
        }
    </script>
</body>
</html>
