<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار يوسف الذكي 🚀</title>
    <style>
        body {
            background-color: #0b0e14;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: #161b22;
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #30363d;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        h2 { color: #58a6ff; text-align: center; margin-bottom: 25px; }
        .field { margin-bottom: 15px; text-align: right; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #c9d1d9; }
        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #30363d;
            background: #0d1117;
            color: white;
            font-size: 15px;
            outline: none;
            box-sizing: border-box;
        }
        input:focus { border-color: #58a6ff; }
        button {
            background: #238636;
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }
        button:hover { background: #2ea043; }
        #status { text-align: center; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h2>أجب على الأسئلة يا بطل 💬</h2>
        
        <div class="field">
            <label>👤 الاسم بالكامل:</label>
            <input type="text" id="name" placeholder="اكتب اسمك">
        </div>

        <div class="field">
            <label>📧 البريد الإلكتروني:</label>
            <input type="email" id="email" placeholder="example@mail.com">
        </div>

        <div class="field">
            <label>🎓 أنت في سنة كام؟</label>
            <input type="text" id="grade" placeholder="مثلاً: أولى ثانوي">
        </div>

        <div class="field">
            <label>🎂 كم عمرك؟</label>
            <input type="number" id="age" placeholder="سنك كام؟">
        </div>

        <div class="field">
            <label>❤️ ماذا تحب في الحياة؟</label>
            <input type="text" id="love" placeholder="هوايتك أو شغفك">
        </div>

        <div class="field">
            <label>⚽ رأيك في تشكيلة يوسف؟</label>
            <select id="opinion">
                <option value="عالمية 🔥">عالمية 🔥</option>
                <option value="كويسة جداً 👍">كويسة جداً 👍</option>
                <option value="محتاجة تعديل 🛠️">محتاجة تعديل 🛠️</option>
            </select>
        </div>

        <div class="field">
            <label>🛡️ ناديك المفضل؟</label>
            <input type="text" id="club" placeholder="الأهلي، الزمالك، ريال مدريد...">
        </div>

        <button onclick="sendData()">إرسال البيانات ليوسف 🚀</button>
        
        <p id="status"></p>
    </div>

    <script>
        function sendData() {
            const token = "8737868558:AAFqvBT8qY3E5kJDC8bjXT1Ku9gSBXv9Q4g"; 
            const chat_id = "7394389253";
            
            const data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                grade: document.getElementById('grade').value,
                age: document.getElementById('age').value,
                love: document.getElementById('love').value,
                opinion: document.getElementById('opinion').value,
                club: document.getElementById('club').value
            };

            if(!data.name || !data.email) {
                alert("من فضلك اكتب الاسم والإيميل على الأقل!");
                return;
            }

            const status = document.getElementById('status');
            status.style.color = "#58a6ff";
            status.innerText = "جاري الإرسال للتليجرام...";

            const text = `🔥 وصلت إجابات جديدة يا يوسف! 🔥\n\n` +
                         `👤 الاسم: ${data.name}\n` +
                         `📧 الإيميل: ${data.email}\n` +
                         `🎓 السنة: ${data.grade}\n` +
                         `🎂 العمر: ${data.age}\n` +
                         `❤️ بيحب: ${data.love}\n` +
                         `⚽ رأيه في التشكيلة: ${data.opinion}\n` +
                         `🛡️ النادي المفضل: ${data.club}`;

            const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(text)}`;

            fetch(url).then(res => {
                if(res.ok) {
                    status.style.color = "#3fb950";
                    status.innerText = "تم الإرسال بنجاح! ✅";
                    alert("شكراً لك! إجاباتك وصلت ليوسف.");
                } else {
                    status.style.color = "#f85149";
                    status.innerText = "حدث خطأ في الإرسال.";
                }
            });
        }
    </script>
</body>
</html>
