<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة التسجيل | يوسف علاء</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #050505; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .setup-box { background: rgba(15, 15, 15, 0.95); padding: 40px 30px; border-radius: 25px; border: 2px solid #ff003c; text-align: center; width: 90%; max-width: 400px; box-shadow: 0 0 30px rgba(255, 0, 60, 0.4); }
        h1 { font-size: 24px; margin-bottom: 10px; color: #fff; }
        .founder { color: #ffb700; font-size: 14px; margin-bottom: 30px; font-weight: bold; }
        input { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 12px; border: 1px solid #333; background: #111; color: white; outline: none; box-sizing: border-box; }
        input:focus { border-color: #ff003c; }
        .btn-next { background: linear-gradient(45deg, #ff003c, #990024); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: 900; cursor: pointer; width: 100%; font-size: 18px; }
    </style>
</head>
<body>
    <div class="setup-box">
        <h1>⛩️ تسجيل دخول المحاربين</h1>
        <div class="founder">بإشراف القائد: يوسف علاء</div>
        <form onsubmit="saveAndGo(event)">
            <input type="text" id="regName" placeholder="اسمك الحقيقي" required>
            <input type="email" id="regEmail" placeholder="بريدك الإلكتروني" required>
            <button type="submit" class="btn-next">دخول البوابة ⚔️</button>
        </form>
    </div>

    <script>
        function saveAndGo(e) {
            e.preventDefault();
            localStorage.setItem('u_name', document.getElementById('regName').value);
            localStorage.setItem('u_mail', document.getElementById('regEmail').value);
            window.location.href = 'gate.html'; // التأكد من أن الملف القادم اسمه gate.html بالظبط
        }
    </script>
</body>
</html>
