    <style>
        body { font-family: Arial, sans-serif; }
        .chessboard { display: grid; grid-template-columns: repeat(8, 1fr); width: 400px; height: 400px; }
        .square { width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; }
        .black { background-color: #769656; }
        .white { background-color: #eee; }
    </style>

<body>
    <h1>Chess Game</h1>
    <div class="chessboard">
        <!-- Chess squares will be generated here -->
    </div>
    <script>
        const chessboard = document.querySelector('.chessboard');
        const pieces = {
            /* Initial piece positions will go here */
        };

        // Function to create the chessboard
        function createBoard() {
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const square = document.createElement('div');
                    square.classList.add('square', (row + col) % 2 === 0 ? 'white' : 'black');
                    chessboard.appendChild(square);
                }
            }
        }

        // Call the function to create the board
        createBoard();
